<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLD Parser</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #fff;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .input-group input {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: none;
            background: #2d2d2d;
            color: #fff;
            outline: none;
        }

        .input-group button {
            padding: 15px 30px;
            font-size: 18px;
            background: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        .input-group button:hover {
            background: #0056b3;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 18px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Color Coded View */
        .color-coded-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .color-coded-view {
            flex: 1;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 28px;
            text-align: center;
            word-wrap: break-word;
        }

        .token {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            margin: 2px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
            cursor: default;
        }

        .token:hover {
            transform: scale(1.1);
        }

        /* Tree View */
        .tree-view {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 16px;
            white-space: pre;
            overflow-x: auto;
            color: #bbb;
            line-height: 1.5;
        }

        @font-face {
            font-family: 'Elis2';
            src: url('./elis/Elis2.ttf');
        }

        .elis-font {
            font-family: 'Elis2', sans-serif;
            font-size: 32px;
            color: #fff;
        }

        .signature-card {
            background: #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .signature-card-left {
            display: flex;
            flex-direction: column;
        }

        .signature-card-right {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 60px;
            min-height: 50px;
        }

        .hs-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hs-value {
            font-size: 20px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .sig-value {
            font-family: 'Consolas', monospace;
            color: #007bff;
            font-size: 16px;
        }

        .beta-tag {
            font-size: 10px;
            background: #ff9800;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
            letter-spacing: 0px;
        }

        /* Token Colors */
        .bg-ds {
            background-color: #dc3545;
        }

        /* Dominant Handshape */
        .bg-nds {
            background-color: #c82333;
        }

        /* Non-Dominant Handshape */
        .bg-do {
            background-color: #28a745;
        }

        /* Dominant Orientation */
        .bg-ndo {
            background-color: #218838;
        }

        /* Non-Dominant Orientation */
        .bg-loc {
            background-color: #007bff;
        }

        /* Location */
        .bg-act {
            background-color: #e83e8c;
        }

        /* Action Descriptor */
        .bg-hmod {
            background-color: #d81b60;
        }

        /* Handshape Modifier */
        .bg-mov {
            background-color: #ffc107;
            color: #000;
            text-shadow: none;
        }

        /* Movement */
        .bg-punct {
            background-color: #495057;
            color: #fff;
        }
        /* Punctuation */
        .bg-unk {
            background-color: #6c757d;
        }

        /* Unknown */
        
        /* Color Legend */
        .legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 220px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .panel h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background: #444;
        }

        .copy-btn:active {
            background: #555;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>SLD Text Parser</h1>
        <div class="input-group">
            <input type="text" id="sldInput" placeholder="Enter SLD string (e.g. saleiatkKI-a or lléatbj=ra-bj)"
                value="lléatbj=ra-bj" />
            <button onclick="processInput()">Parse</button>
        </div>

        <div class="results" id="resultsContainer" style="display: none;">
            <div class="panel">
                <h2>Color Coded Parsing</h2>
                <div class="color-coded-container">
                    <div class="color-coded-view" id="colorCodedView"></div>
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-box bg-ds"></div> Dominant Handshape
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-nds"></div> Non-Dominant Handshape
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-do"></div> Dominant Orientation
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-ndo"></div> Non-Dominant Orientation
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-loc"></div> Location
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-act"></div> Action Descriptor
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-hmod"></div> Handshape Change
                        </div>
                        <div class="legend-item">
                            <div class="legend-box bg-mov"></div> Movement
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel" id="signaturesPanel" style="display: none;">
                <h2>
                    <span>Handshape Signatures & Elis <span class="beta-tag">BETA</span></span>
                </h2>
                <div id="signaturesView"></div>
            </div>

            <div class="panel">
                <h2>
                    JSON View
                    <button class="copy-btn" onclick="copyContent('jsonView')">📋 Copy</button>
                </h2>
                <div class="tree-view" id="jsonView"></div>
            </div>

            <div class="panel">
                <h2>
                    Tree Structure
                    <button class="copy-btn" onclick="copyContent('treeView')">📋 Copy</button>
                </h2>
                <div class="tree-view" id="treeView"></div>
            </div>
        </div>
    </div>

    <script src="signature_calculator.js"></script>
    <script src="sld_parser.js"></script>

</body>

</html>
